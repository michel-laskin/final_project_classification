            overflow-x: auto;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);

        .tab-button {
            background: transparent;
            border: none;
            color: #a0a0a0;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;

            margin-right: 5px;
            margin-bottom: -2px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        
        .tab-button:before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .tab-button:hover {
            color: #ffffff;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .tab-button.active {
            color: #ffffff;
            background: rgba(102, 126, 234, 0.2);
            font-weight: 600;
        }
        
        .tab-button.active:before {
            transform: scaleX(1);
        }
        
        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.5s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .plot-container {
            background: rgba(30, 34, 54, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .plot-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #808080;
            font-size: 0.9em;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
