<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Encoder Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: #fff;
            padding: 30px;
            color: #333;
        }

        .figure {
            margin-bottom: 40px;
            text-align: center;
        }

        .figure-caption {
            font-size: 11px;
            margin-top: 12px;
            color: #444;
        }

        .figure-caption strong {
            font-weight: bold;
        }

        .block-diagram {
            border: 1px dashed #999;
            padding: 15px;
            position: relative;
            background: #fafafa;
            display: inline-block;
        }

        .block-title {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #fff;
            padding: 0 5px;
            font-size: 10px;
            color: #666;
        }

        .node {
            padding: 6px 12px;
            font-size: 10px;
            text-align: center;
            margin: 0 auto;
            min-width: 80px;
            border: 1px solid #666;
        }

        /* I/O boundaries - sage green */
        .node.input {
            background: #b8d4be;
            border-radius: 15px;
        }

        .node.output {
            background: #b8d4be;
            border-radius: 15px;
        }

        /* Linear/transformation operations - warm orange */
        .node.linear {
            background: #f0b886;
        }

        /* Normalization - slate blue */
        .node.norm {
            background: #a3bfdb;
        }

        /* Activation functions - slate blue */
        .node.activation {
            background: #a3bfdb;
        }

        /* Regularization (dropout) - soft coral */
        .node.regularization {
            background: #f0a8a8;
        }

        .arrow {
            text-align: center;
            color: #666;
            font-size: 10px;
            margin: 3px 0;
        }

        .flow {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dim-label {
            font-size: 9px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>

<body>

    <!-- Feature Encoder Architecture -->
    <div class="figure">
        <div class="block-diagram" style="padding: 25px 40px;">
            <div class="block-title">FeatureEncoder</div>
            <div class="flow">
                <div class="node input">Input</div>
                <div class="arrow">↓</div>
                <div class="node linear">Linear</div>
                <div class="arrow">↓</div>
                <div class="node norm">LayerNorm</div>
                <div class="arrow">↓</div>
                <div class="node activation">ReLU</div>
                <div class="arrow">↓</div>
                <div class="node regularization">Dropout</div>
                <div class="arrow">↓</div>
                <div class="node output">Output</div>
            </div>
        </div>
        <div class="figure-caption"><strong>Figure 1.</strong> FeatureEncoder: MLP-based projection block.
            Pipeline: Linear → LayerNorm → ReLU → Dropout.</div>
    </div>

</body>

</html>
