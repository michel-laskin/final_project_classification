<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Encoder Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background: #fff;
            padding: 30px;
            color: #333;
        }

        .figure {
            margin-bottom: 40px;
            text-align: center;
        }

        .figure-caption {
            font-size: 11px;
            margin-top: 12px;
            color: #444;
        }

        .figure-caption strong {
            font-weight: bold;
        }

        .block-diagram {
            border: 1px dashed #999;
            padding: 20px 30px;
            position: relative;
            background: #fafafa;
            display: inline-block;
        }

        .block-title {
            position: absolute;
            top: -10px;
            right: 10px;
            background: #fff;
            padding: 0 5px;
            font-size: 10px;
            color: #666;
        }

        .node {
            padding: 8px 14px;
            font-size: 10px;
            text-align: center;
            min-width: 90px;
            border: 1px solid #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .node-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .node-details {
            font-size: 8px;
            color: #555;
            line-height: 1.3;
        }

        .node-params {
            font-size: 8px;
            color: #666;
            font-style: italic;
            margin-top: 2px;
        }

        /* I/O boundaries - sage green */
        .node.input {
            background: #b8d4be;
            border-radius: 15px;
        }

        .node.output {
            background: #b8d4be;
            border-radius: 15px;
        }

        /* Linear/transformation operations - warm orange */
        .node.linear {
            background: #f0b886;
        }

        /* Normalization - slate blue */
        .node.norm {
            background: #a3bfdb;
        }

        /* Activation functions - slate blue */
        .node.activation {
            background: #a3bfdb;
        }

        /* Regularization (dropout) - soft coral */
        .node.regularization {
            background: #f0a8a8;
        }

        .arrow {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin: 0 8px;
            display: flex;
            align-items: center;
        }

        .flow {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- Feature Encoder Architecture -->
    <div class="figure">
        <div class="block-diagram">
            <div class="block-title">FeatureEncoder</div>
            <div class="flow">
                <div class="node input">
                    <div class="node-name">Input</div>
                    <div class="node-details">[B, S, 146]</div>
                </div>
                <div class="arrow">→</div>
                <div class="node linear">
                    <div class="node-name">Linear</div>
                    <div class="node-details">146 → 16</div>
                    <div class="node-params">2,352 params</div>
                </div>
                <div class="arrow">→</div>
                <div class="node norm">
                    <div class="node-name">LayerNorm</div>
                    <div class="node-details">16 → 16</div>
                    <div class="node-params">32 params</div>
                </div>
                <div class="arrow">→</div>
                <div class="node activation">
                    <div class="node-name">ReLU</div>
                    <div class="node-details">16 → 16</div>
                </div>
                <div class="arrow">→</div>
                <div class="node regularization">
                    <div class="node-name">Dropout</div>
                    <div class="node-details">16 → 16</div>
                </div>
                <div class="arrow">→</div>
                <div class="node output">
                    <div class="node-name">Output</div>
                    <div class="node-details">[B, S, 16]</div>
                </div>
            </div>
        </div>
        <div class="figure-caption"><strong>Figure 1.</strong> FeatureEncoder: MLP-based projection block.
            Pipeline: Linear → LayerNorm → ReLU → Dropout. Total learnable parameters: 2,384.</div>
    </div>

</body>

</html>
